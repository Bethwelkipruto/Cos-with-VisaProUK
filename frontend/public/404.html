<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BritPath</title>
    <script>
      // GitHub Pages SPA fix
      // Stores the full path in sessionStorage then redirects to the root
      // index.html picks it up and passes it to React Router
      var l = window.location;
      sessionStorage.setItem(
        'spa_redirect',
        l.pathname.slice('/Cos-with-VisaProUK'.length) + l.search + l.hash
      );
      l.replace('/Cos-with-VisaProUK/');
    </script>
  </head>
  <body></body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BritPath</title>
    <script>
      // GitHub Pages SPA fix — redirects 404s back to index.html
      // preserving the path so React Router can handle it
      var path = window.location.pathname.replace('/Cos-with-VisaProUK', '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        '/Cos-with-VisaProUK/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
